name: Lint

on:
  push:
    branches:
      - 'main'
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: Lint Kotlin SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # 6.0.3
      - name: Lint
        run: |
          ./gradlew ktlintCheck
